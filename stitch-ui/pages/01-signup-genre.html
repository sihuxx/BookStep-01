<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background-color: #004ac6;
            color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d3e4fe;
            border-radius: 10px;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #2563eb33;
        }
        .step-up-bg {
            background: linear-gradient(135deg, #f8f9ff 0%, #e5eeff 100%);
        }

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface font-body-md text-body-md antialiased min-h-screen flex flex-col">
<!-- Top Navigation Header -->
<header class="w-full sticky top-0 z-50 bg-surface/80 backdrop-blur-md shadow-sm shadow-primary/10">
<div class="flex items-center justify-between px-container-margin py-xs w-full max-w-7xl mx-auto h-16">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">BookStep</span>
</div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</div>
</header>
<main class="flex-grow w-full max-w-xl mx-auto px-container-margin py-lg flex flex-col gap-xl">
<!-- Welcome Section -->
<section class="flex flex-col gap-xs">
<h1 class="font-display-lg text-display-lg text-on-surface">Start your growth.</h1>
<p class="text-on-surface-variant font-body-lg text-body-lg">Create an account and tell us what you love to read.</p>
</section>
<!-- Form Section -->
<form class="flex flex-col gap-lg" id="signup-form" onsubmit="return false;">
<!-- Credentials Card -->
<div class="bg-surface-container-lowest p-lg rounded-xl shadow-[0_4px_12px_rgba(37,99,235,0.04)] border border-surface-variant/30 flex flex-col gap-md">
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="email">School Email</label>
<input class="h-14 w-full bg-surface-bright border border-outline-variant rounded-xl px-md focus:border-primary focus:ring-0 transition-all placeholder:text-outline font-body-md text-body-md" id="email" placeholder="you@student.edu" type="email"/>
</div>
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="password">Password</label>
<div class="relative">
<input class="h-14 w-full bg-surface-bright border border-outline-variant rounded-xl px-md focus:border-primary focus:ring-0 transition-all placeholder:text-outline font-body-md text-body-md" id="password" placeholder="Min. 8 characters" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="confirm-password">Confirm Password</label>
<input class="h-14 w-full bg-surface-bright border border-outline-variant rounded-xl px-md focus:border-primary focus:ring-0 transition-all placeholder:text-outline font-body-md text-body-md" id="confirm-password" placeholder="Repeat your password" type="password"/>
</div>
</div>
<!-- Interest Genre Section -->
<div class="flex flex-col gap-md">
<div class="flex items-end justify-between px-1">
<h2 class="font-headline-md text-headline-md text-on-surface">Interest Genre</h2>
<span class="font-label-sm text-label-sm text-primary">Pick 3 or more</span>
</div>
<!-- Genre Bento Grid / Chips Cluster -->
<div class="grid grid-cols-2 sm:grid-cols-3 gap-sm" id="genre-container">
<button class="genre-chip flex items-center justify-between p-md bg-energy-blue/40 border border-transparent text-on-surface-variant rounded-xl hover:bg-energy-blue transition-all active:scale-95 text-left" onclick="toggleGenre(this)" type="button">
<span class="font-label-md text-label-md">Novel</span>
<span class="material-symbols-outlined text-[20px]">auto_stories</span>
</button>
<button class="genre-chip flex items-center justify-between p-md bg-energy-blue/40 border border-transparent text-on-surface-variant rounded-xl hover:bg-energy-blue transition-all active:scale-95 text-left" onclick="toggleGenre(this)" type="button">
<span class="font-label-md text-label-md">Poetry</span>
<span class="material-symbols-outlined text-[20px]">features</span>
</button>
<button class="genre-chip flex items-center justify-between p-md bg-energy-blue/40 border border-transparent text-on-surface-variant rounded-xl hover:bg-energy-blue transition-all active:scale-95 text-left" onclick="toggleGenre(this)" type="button">
<span class="font-label-md text-label-md">Essay</span>
<span class="material-symbols-outlined text-[20px]">history_edu</span>
</button>
<button class="genre-chip flex items-center justify-between p-md bg-energy-blue/40 border border-transparent text-on-surface-variant rounded-xl hover:bg-energy-blue transition-all active:scale-95 text-left" onclick="toggleGenre(this)" type="button">
<span class="font-label-md text-label-md">SF</span>
<span class="material-symbols-outlined text-[20px]">rocket_launch</span>
</button>
<button class="genre-chip flex items-center justify-between p-md bg-energy-blue/40 border border-transparent text-on-surface-variant rounded-xl hover:bg-energy-blue transition-all active:scale-95 text-left" onclick="toggleGenre(this)" type="button">
<span class="font-label-md text-label-md">Fantasy</span>
<span class="material-symbols-outlined text-[20px]">castle</span>
</button>
<button class="genre-chip flex items-center justify-between p-md bg-energy-blue/40 border border-transparent text-on-surface-variant rounded-xl hover:bg-energy-blue transition-all active:scale-95 text-left" onclick="toggleGenre(this)" type="button">
<span class="font-label-md text-label-md">Mystery</span>
<span class="material-symbols-outlined text-[20px]">search_check</span>
</button>
<button class="genre-chip flex items-center justify-between p-md bg-energy-blue/40 border border-transparent text-on-surface-variant rounded-xl hover:bg-energy-blue transition-all active:scale-95 text-left" onclick="toggleGenre(this)" type="button">
<span class="font-label-md text-label-md">Science</span>
<span class="material-symbols-outlined text-[20px]">biotech</span>
</button>
<button class="genre-chip flex items-center justify-between p-md bg-energy-blue/40 border border-transparent text-on-surface-variant rounded-xl hover:bg-energy-blue transition-all active:scale-95 text-left" onclick="toggleGenre(this)" type="button">
<span class="font-label-md text-label-md">Art</span>
<span class="material-symbols-outlined text-[20px]">palette</span>
</button>
</div>
</div>
</form>
<!-- Illustration / Motivational Banner -->
<div class="relative w-full h-48 rounded-xl overflow-hidden mt-xl">
<div class="absolute inset-0 bg-cover bg-center" data-alt="A modern, vibrant digital illustration of a diverse group of teenagers sitting together in a sunlit, contemporary school lounge. One is reading a tablet, another a physical book, and they look inspired and happy. The style is clean, minimal, and sophisticated with pops of energetic blue and soft green highlights. Bright, high-key lighting creates a welcoming, mentorship-focused atmosphere." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD0JMWrcL10uqEaIDd9da-7mX8YSVLBtDsPJmegKgmP-aQNS3A6ZtOwcs4aJvNAUn6fP5lhq9dRXtRyxzL77mp0ebav0loNvNOHPuDDxoqgdUf0f1KxKOAUF_AkxuYqd-aQ36U0VVIjyQ7A61JZ5fJAH_fgRC22Cn2Qb9_Gix83UcLTjQhTFOeUdtNEfmSyVi5anSQhqsQnqZmAM5YFZY15EY1j63Ldt7alhviCsicAOxooeY6AXZXeupzV4rcpNW-BOXuo_cDvMZY')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-primary/60 to-transparent flex items-end p-lg">
<p class="text-on-primary font-headline-md text-headline-md drop-shadow-md">Unlock your potential.</p>
</div>
</div>
<!-- Spacer for FAB-like Primary Button on Mobile -->
<div class="h-24"></div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 right-0 p-container-margin bg-gradient-to-t from-surface via-surface to-transparent md:bg-transparent md:relative md:p-0 md:mb-xl flex justify-center z-50">
<button class="w-full max-w-xl h-14 bg-primary text-on-primary rounded-xl font-title-lg text-title-lg shadow-lg shadow-primary/20 hover:bg-primary-container transition-all active:scale-[0.98] flex items-center justify-center gap-sm" form="signup-form" type="submit">
<span>Complete Signup</span>
<span class="material-symbols-outlined">trending_up</span>
</button>
</div>
<script>
        function toggleGenre(button) {
            button.classList.toggle('active');
            
            // Interaction feedback
            if (button.classList.contains('active')) {
                const icon = button.querySelector('.material-symbols-outlined');
                icon.style.fontVariationSettings = "'FILL' 1";
            } else {
                const icon = button.querySelector('.material-symbols-outlined');
                icon.style.fontVariationSettings = "'FILL' 0";
            }
        }

        // Add some atmospheric float to the illustration
        const banner = document.querySelector('.relative.w-full.h-48');
        if(banner) {
            banner.addEventListener('mousemove', (e) => {
                const { left, top, width, height } = banner.getBoundingClientRect();
                const x = (e.clientX - left) / width - 0.5;
                const y = (e.clientY - top) / height - 0.5;
                banner.querySelector('div').style.transform = `scale(1.1) translate(${x * 10}px, ${y * 10}px)`;
            });
            banner.addEventListener('mouseleave', () => {
                banner.querySelector('div').style.transform = `scale(1) translate(0, 0)`;
            });
            banner.querySelector('div').style.transition = 'transform 0.2s ease-out';
        }
    </script>
</body></html>
