<script>
        // Micro-interactions and subtle entrance animations
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.classList.add('scale-[1.01]');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.classList.remove('scale-[1.01]');
                });
            });

            // Gentle parallax on atmospheric blobs
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                
                const blobs = document.querySelectorAll('.rounded-full.blur');
                blobs.forEach((blob, index) => {
                    const factor = index === 0 ? 1 : -1;
                    blob.style.transform = `translate(${moveX * factor}px, ${moveY * factor}px)`;
                });
            });
        });
    </script>
